services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: qbittorrent-mcp:local
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: ${PORT:-7100}
    ports:
      - "${PORT:-7100}:${PORT:-7100}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://127.0.0.1:${PORT:-7100}/api/ready\" || exit 1"]
      interval: 10m
      timeout: 35s
      start_period: 45s
      retries: 3
    restart: always
